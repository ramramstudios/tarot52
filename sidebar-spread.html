<!--
  sidebar-spread.html — Tarot spread component, injected into index.html.
  Standalone-renderable so it can be opened directly during scaffolding.
-->
<section class="page page-tarot sidebar-spread-root">
  <nav class="page-toolbar" aria-label="Spread controls">
    <a class="nav-link" href="lore.html">Lore</a>
    <label class="draw-count">
      <span class="draw-count-label">Mode</span>
      <select id="drawCount" aria-label="Reading mode"></select>
    </label>
    <button class="btn-primary btn-compact" id="newReadingBtn">New <span class="btn-label-extra">Spread</span></button>
  </nav>

  <div class="tarot-spread" id="tarotSpread"></div>

  <div class="tarot-reading" id="tarotReading"></div>
</section>
