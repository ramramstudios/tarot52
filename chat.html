<!--
  chat.html — LLM chat scaffold, injected into index.html.
  Scaffold only: builds mock reading responses, no model wired up yet.
-->
<section class="chat-root">
  <header class="chat-header">
    <button
      type="button"
      class="pane-toggle chat-collapse-toggle"
      id="chatCollapseToggle"
      data-pane-toggle
      aria-pressed="false"
      aria-label="Show the spread"
      title="Show spread"
    >
      <span class="hamburger-icon" aria-hidden="true"></span>
      <span class="chat-collapse-label">Show spread</span>
    </button>
    <div class="chat-header-text">
      <h2 class="chat-title">Tarot Chat</h2>
      <p class="chat-subtitle">Ask first. Draw second. Read in context.</p>
    </div>
    <button
      type="button"
      class="chat-new-btn"
      id="chatNewBtn"
      aria-haspopup="dialog"
      aria-controls="newChatModal"
      title="Start a new chat"
    >New</button>
  </header>

  <div class="chat-thread" id="chatThread" role="log" aria-live="polite" aria-label="Chat messages">
    <div class="chat-empty">
      <p>This is where your reading will appear.</p>
      <p class="chat-empty-hint">Type a question below to begin.</p>
    </div>
  </div>

  <form class="chat-composer" id="chatComposer" autocomplete="off">
    <label class="visually-hidden" for="chatInput">Message</label>
    <textarea
      id="chatInput"
      class="chat-input"
      rows="1"
      placeholder="Ask the cards…"
      aria-label="Message"
    ></textarea>
    <button type="submit" class="chat-send" id="chatSend" aria-label="Send message">
      <span aria-hidden="true">↑</span>
    </button>
  </form>

  <div
    class="modal-backdrop"
    id="newChatModalBackdrop"
    hidden
    role="presentation"
  >
    <div
      class="modal"
      id="newChatModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="newChatModalTitle"
      aria-describedby="newChatModalDesc"
    >
      <h3 class="modal-title" id="newChatModalTitle">Start a new chat?</h3>
      <p class="modal-desc" id="newChatModalDesc">
        This will clear the current thread and shuffle a new deck.
      </p>
      <label class="modal-field">
        <span class="modal-field-label">Reading mode</span>
        <select id="newChatModeSelect" aria-label="Reading mode"></select>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="newChatCancelBtn">Cancel</button>
        <button type="button" class="btn-primary" id="newChatStartBtn">Start</button>
      </div>
    </div>
  </div>
</section>
