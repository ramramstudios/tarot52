<!--
  chat.html — LLM chat scaffold, injected into index.html.
  Scaffold only: builds mock reading responses, no model wired up yet.
-->
<section class="chat-root">
  <header class="chat-header">
    <button
      type="button"
      class="pane-toggle chat-collapse-toggle"
      id="chatCollapseToggle"
      data-pane-toggle
      aria-pressed="false"
      aria-label="Show the spread"
      title="Show spread"
    >
      <span class="hamburger-icon" aria-hidden="true"></span>
      <span class="chat-collapse-label">Show spread</span>
    </button>
    <div class="chat-header-text">
      <h2 class="chat-title">Poker Chat</h2>
    </div>
    <button
      type="button"
      class="chat-new-btn"
      id="chatNewBtn"
      aria-haspopup="dialog"
      aria-controls="newChatModal"
      title="Start a new chat"
    >New</button>
    <button
      type="button"
      class="chat-profile-btn"
      id="chatProfileBtn"
      aria-haspopup="dialog"
      aria-controls="profileModal"
      aria-label="Birth chart profile"
      title="Birth chart profile"
    >
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="12" cy="8" r="3.5"></circle>
        <path d="M5 20a7 7 0 0 1 14 0"></path>
      </svg>
    </button>
  </header>

  <div class="chat-thread" id="chatThread" role="log" aria-live="polite" aria-label="Chat messages">
    <div class="chat-empty">
      <p>This is where your reading will appear.</p>
      <p class="chat-empty-hint">Type a question below to begin.</p>
    </div>
  </div>

  <div class="chat-composer-shell">
    <form class="chat-composer" id="chatComposer" autocomplete="off">
      <label class="visually-hidden" for="chatInput">Message</label>
      <textarea
        id="chatInput"
        class="chat-input"
        rows="1"
        placeholder="Ask the cards…"
        aria-label="Message"
      ></textarea>
      <button type="submit" class="chat-send" id="chatSend" aria-label="Send message">
        <span aria-hidden="true">↑</span>
      </button>
    </form>
    <div class="chat-composer-actions" id="chatComposerActions" hidden></div>
  </div>

  <div
    class="modal-backdrop"
    id="newChatModalBackdrop"
    hidden
    role="presentation"
  >
    <div
      class="modal"
      id="newChatModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="newChatModalTitle"
      aria-describedby="newChatModalDesc"
    >
      <h3 class="modal-title" id="newChatModalTitle">Start a new chat?</h3>
      <p class="modal-desc" id="newChatModalDesc">
        This will clear the current thread and shuffle a new deck.
      </p>
      <label class="modal-field">
        <span class="modal-field-label">Reading mode</span>
        <select id="newChatModeSelect" aria-label="Reading mode"></select>
      </label>
      <div class="modal-actions">
        <button type="button" class="btn-primary" id="newChatStartBtn">Start</button>
      </div>
    </div>
  </div>

  <div
    class="modal-backdrop"
    id="profileModalBackdrop"
    hidden
    role="presentation"
  >
    <div
      class="modal"
      id="profileModal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="profileModalTitle"
      aria-describedby="profileModalDesc"
    >
      <h3 class="modal-title" id="profileModalTitle">Birth chart profile</h3>
      <p class="modal-desc" id="profileModalDesc">
        Optionally add your sun, moon, and rising signs. They can inform readings when they are relevant.
      </p>
      <div class="profile-sign-grid">
        <label class="modal-field">
          <span class="modal-field-label">Sun</span>
          <select id="profileSunSelect" aria-label="Sun sign"></select>
        </label>
        <label class="modal-field">
          <span class="modal-field-label">Moon</span>
          <select id="profileMoonSelect" aria-label="Moon sign"></select>
        </label>
        <label class="modal-field">
          <span class="modal-field-label">Rising</span>
          <select id="profileRisingSelect" aria-label="Rising sign"></select>
        </label>
      </div>
      <div class="modal-actions modal-actions-split">
        <button type="button" class="btn-secondary" id="profileClearBtn">Clear</button>
        <button type="button" class="btn-primary" id="profileSaveBtn">Save</button>
      </div>
    </div>
  </div>
</section>
